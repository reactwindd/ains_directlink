<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AINS | DirectLink</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                background-color: #f3f4f6;
                color: #1f2937;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                padding: 20px;
            }

            .form-card {
                background: #ffffff;
                padding: 32px;
                border-radius: 8px;
                box-shadow:
                    0 4px 6px -1px rgba(0, 0, 0, 0.1),
                    0 2px 4px -1px rgba(0, 0, 0, 0.06);
                width: 100%;
                max-width: 450px;
            }

            fieldset {
                border: none;
                display: flex;
                flex-direction: column;
                gap: 16px;
            }

            h1 {
                font-size: 1.25rem;
                font-weight: 600;
                margin-bottom: 8px;
                color: #111827;
            }

            label {
                font-size: 0.875rem;
                font-weight: 500;
                color: #4b5563;
                margin-bottom: -10px;
            }

            input[type="text"],
            textarea {
                width: 100%;
                padding: 10px 12px;
                border: 1px solid #d1d5db;
                border-radius: 6px;
                font-family: inherit;
                font-size: 0.95rem;
                color: #1f2937;
                background-color: #fff;
                outline: none;
                transition:
                    border-color 0.2s,
                    box-shadow 0.2s;
            }

            input[type="text"]:focus,
            textarea:focus {
                border-color: #2563eb;
                box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
            }

            textarea {
                resize: vertical;
                min-height: 80px;
            }

            input[type="submit"] {
                background-color: #2563eb;
                color: #ffffff;
                padding: 12px;
                border: none;
                border-radius: 6px;
                font-size: 0.95rem;
                font-weight: 600;
                cursor: pointer;
                transition: background-color 0.2s;
                margin-top: 8px;
            }

            input[type="submit"]:hover {
                background-color: #1d4ed8;
            }
        </style>
    </head>
    <body>
        <div class="form-card">
            <form action="/api/submit" method="post">
                <fieldset>
                    <h1>AINS | DirectLink</h1>
                    <label for="token">Bearer Token</label>
                    <textarea
                        id="token"
                        name="token"
                        placeholder="Paste token here..."
                    ></textarea>

                    <label for="cookies">Cookies</label>
                    <textarea
                        id="cookies"
                        name="cookies"
                        placeholder="Paste cookies here..."
                    ></textarea>

                    <input type="submit" value="Submit" />
                </fieldset>
            </form>
        </div>
    </body>
</html>
